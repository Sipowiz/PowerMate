# ──────────────────────────────────────────────────────────────────────
# PowerMate Driver — Azure DevOps Pipeline
#
# CI:  Build + Test on every push to main
# CD:  Build installer + publish artifact on version tags (v*)
# ──────────────────────────────────────────────────────────────────────

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - 'v*'

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'
  targetFramework: 'net10.0-windows10.0.19041.0'
  runtime: 'win-x64'
  isTag: $[startsWith(variables['Build.SourceBranch'], 'refs/tags/v')]
  versionTag: $[replace(variables['Build.SourceBranch'], 'refs/tags/v', '')]

stages:
  # ── CI: Build & Test ─────────────────────────────────────────────────
  - stage: Build
    displayName: 'Build & Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build, Test, Publish'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - script: dotnet restore PowerMate.sln
            displayName: 'Restore'

          - script: dotnet build PowerMate.sln -c $(buildConfiguration) --no-restore -f $(targetFramework)
            displayName: 'Build'

          - script: dotnet test PowerMate.Tests/PowerMate.Tests.csproj -c $(buildConfiguration) --no-build --logger trx --results-directory $(Agent.TempDirectory)/TestResults
            displayName: 'Run Tests'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '$(Agent.TempDirectory)/TestResults/**/*.trx'

          - script: dotnet publish PowerMate/PowerMate.csproj -f $(targetFramework) -c $(buildConfiguration) -r $(runtime) --self-contained true -p:Version=$(versionTag)
            displayName: 'Publish App'
            condition: eq(variables.isTag, true)

          - powershell: |
              $url = "https://jrsoftware.org/download.php/is.exe"
              $installer = "$(Agent.TempDirectory)\innosetup.exe"
              Invoke-WebRequest -Uri $url -OutFile $installer
              Start-Process -FilePath $installer -ArgumentList '/VERYSILENT', '/SUPPRESSMSGBOXES', '/NORESTART' -Wait
            displayName: 'Install Inno Setup'
            condition: eq(variables.isTag, true)

          - script: |
              "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$(versionTag)" installer.iss
            displayName: 'Compile Installer'
            condition: eq(variables.isTag, true)

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Installer Artifact'
            condition: eq(variables.isTag, true)
            inputs:
              pathToPublish: 'installer_output'
              artifactName: 'PowerMateSetup-$(versionTag)'

  # ── CD: Create GitHub/ADO Release ────────────────────────────────────
  - stage: Release
    displayName: 'Create Release'
    dependsOn: Build
    condition: and(succeeded(), eq(variables.isTag, true))
    jobs:
      - job: CreateRelease
        displayName: 'Publish Release'
        steps:
          - download: current
            artifact: 'PowerMateSetup-$(versionTag)'

          - task: GitHubRelease@1
            displayName: 'Create GitHub Release'
            inputs:
              gitHubConnection: 'github-connection'   # ← set up a service connection in ADO
              repositoryName: '$(Build.Repository.Name)'
              action: 'create'
              target: '$(Build.SourceVersion)'
              tagSource: 'gitTag'
              title: 'PowerMate Driver $(versionTag)'
              releaseNotesSource: 'inline'
              releaseNotesInline: 'PowerMate Driver $(versionTag) — Windows installer'
              assets: '$(Pipeline.Workspace)/PowerMateSetup-$(versionTag)/*'
              isDraft: false
              isPreRelease: false
